name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: Check release token configuration
        if: ${{ env.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "::notice title=Release token missing::Configure RELEASE_PLEASE_TOKEN or enable GitHub Actions PR creation for release automation."

      - id: release
        if: ${{ env.RELEASE_PLEASE_TOKEN != '' }}
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ env.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          bun-version: 1.1.43

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created == 'true' }}
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: bun install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: bun run check
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - run: npm publish
        if: ${{ steps.release.outputs.release_created == 'true' }}
